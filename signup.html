<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Sign up — Crossroot universal file search." />
  <title>Sign up | Crossroot</title>
  <link rel="icon" href="assets/icons/logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="signup">
  <div data-header></div>
  
<main class="auth-wrap">
  <section class="auth-card glass reveal">
    <a class="brand auth-brand" href="index.html"><img src="assets/icons/logo.svg" alt="" /><span>Crossroot</span></a>
    <h1>Join Crossroot</h1>
    <p>Create an account to join the private beta and receive product updates.</p>
    <form class="auth-form" data-auth-form="signup">
      <div class="field"><label for="name">Name</label><input id="name" autocomplete="name" required /></div>
      <div class="field"><label for="email">Email address</label><input id="email" type="email" autocomplete="email" required /></div>
      <div class="field"><label for="password">Password</label><input id="password" type="password" autocomplete="new-password" minlength="8" required /></div>
      <button class="btn btn-primary btn-lg btn-block" type="submit">Create account</button>
      <p class="form-status" role="status"></p>
    </form>
    <div class="divider"><span>or</span></div>
    <button class="btn btn-secondary btn-lg btn-block" type="button" data-google-auth>Continue with Google</button>
    <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
    <div class="auth-note">Your account will be created securely through Firebase Authentication.</div>
  </section>
</main>

  <div data-footer></div>
  <script src="js/main.js"></script>
  <script type="module" src="js/auth-state.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
