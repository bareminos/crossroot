<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Reset your Crossroot account password." />
  <title>Reset password | Crossroot</title>
  <link rel="icon" href="assets/icons/logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="reset">
  <div data-header></div>
  <main class="auth-wrap">
    <section class="auth-card glass reveal">
      <a class="brand auth-brand" href="index.html"><img src="assets/icons/logo.svg" alt="" /><span>Crossroot</span></a>
      <h1>Reset password</h1>
      <p>Enter your account email. Firebase will send you a secure password-reset link.</p>
      <form class="auth-form" data-reset-form>
        <div class="field">
          <label for="reset-email">Email address</label>
          <input id="reset-email" type="email" autocomplete="email" required />
        </div>
        <button class="btn btn-primary btn-lg btn-block" type="submit">Send reset email</button>
        <p class="form-status" role="status"></p>
      </form>
      <p class="auth-switch"><a href="login.html">Return to login</a></p>
    </section>
  </main>
  <div data-footer></div>
  <script src="js/main.js"></script>
  <script type="module" src="js/auth-state.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
