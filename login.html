<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Log in — Crossroot universal file search." />
  <title>Log in | Crossroot</title>
  <link rel="icon" href="assets/icons/logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="login">
  <div data-header></div>
  
<main class="auth-wrap">
  <section class="auth-card glass reveal">
    <a class="brand auth-brand" href="index.html"><img src="assets/icons/logo.svg" alt="" /><span>Crossroot</span></a>
    <h1>Welcome back</h1>
    <p>Log in to manage your Crossroot account and connected devices.</p>
    <form class="auth-form" data-auth-form="login">
      <div class="field"><label for="email">Email address</label><input id="email" type="email" autocomplete="email" required /></div>
      <div class="field"><label for="password">Password</label><input id="password" type="password" autocomplete="current-password" minlength="8" required /></div>
      <div class="auth-links"><span></span><a href="forgot-password.html">Forgot password?</a></div>
      <button class="btn btn-primary btn-lg btn-block" type="submit">Log in</button>
      <p class="form-status" role="status"></p>
    </form>
    <div class="divider"><span>or</span></div>
    <button class="btn btn-secondary btn-lg btn-block" type="button" data-google-auth>Continue with Google</button>
    <p class="auth-switch">New to Crossroot? <a href="signup.html">Create an account</a></p>
    <div class="auth-note">Authentication is powered by Firebase. Crossroot never sees your password directly.</div>
  </section>
</main>

  <div data-footer></div>
  <script src="js/main.js"></script>
  <script type="module" src="js/auth-state.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
